version: 1
metadata:
  name: aethergate-sso
  labels:
    blueprints.goauthentik.io/description: >
      AetherGate OIDC apps for Open WebUI and LiteLLM
entries:
  - model: authentik_providers_oauth2.oauth2provider
    id: provider-openwebui
    state: present
    identifiers:
      name: AetherGate Open WebUI
    attrs:
      name: AetherGate Open WebUI
      client_type: confidential
      client_id: aethergate-openwebui
      client_secret: !Env OPENWEBUI_OAUTH_CLIENT_SECRET
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:3000/oauth/oidc/callback
      include_claims_in_id_token: true
      sub_mode: user_email
      issuer_mode: per_provider
      access_code_validity: minutes=1
      access_token_validity: hours=1
      refresh_token_validity: days=30
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

  - model: authentik_core.application
    id: app-openwebui
    state: present
    identifiers:
      slug: aethergate-openwebui
    attrs:
      name: AetherGate Open WebUI
      slug: aethergate-openwebui
      policy_engine_mode: any
      provider: !KeyOf provider-openwebui

  - model: authentik_providers_oauth2.oauth2provider
    id: provider-litellm
    state: present
    identifiers:
      name: AetherGate LiteLLM
    attrs:
      name: AetherGate LiteLLM
      client_type: confidential
      client_id: aethergate-litellm
      client_secret: !Env LITELLM_OAUTH_CLIENT_SECRET
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:4000/sso/callback
      include_claims_in_id_token: true
      sub_mode: user_email
      issuer_mode: per_provider
      access_code_validity: minutes=1
      access_token_validity: hours=1
      refresh_token_validity: days=30
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]

  - model: authentik_core.application
    id: app-litellm
    state: present
    identifiers:
      slug: aethergate-litellm
    attrs:
      name: AetherGate LiteLLM
      slug: aethergate-litellm
      policy_engine_mode: any
      provider: !KeyOf provider-litellm
